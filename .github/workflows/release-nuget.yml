name: Release NuGet

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag in vX.Y.Z format"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use vX.Y.Z format, for example v0.1.1." >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore and audit packages
        run: |
          dotnet restore Kawa.sln \
            -p:NuGetAudit=true \
            -p:NuGetAuditMode=all \
            -p:NuGetAuditLevel=low \
            "-warnaserror:NU1901;NU1902;NU1903;NU1904"

      - name: Pack
        env:
          PACKAGE_VERSION: ${{ steps.release.outputs.version }}
          CONFIGURATION: Release
        run: bash eng/pack.sh

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages-${{ steps.release.outputs.version }}
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error

      - name: Publish to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: bash eng/push-nuget.sh

      - name: Prepare release notes
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          extract_changelog_section() {
            local file="$1"
            local version="$2"

            awk -v version="$version" '
              $0 ~ "^## \\[" version "\\]" {
                found = 1
                print
                next
              }
              found && /^## \[/ {
                exit
              }
              found {
                print
              }
            ' "$file"
          }

          extract_changelog_section CHANGELOG.md "$VERSION" > release-notes.en.md
          extract_changelog_section CHANGELOG.ja.md "$VERSION" > release-notes.ja.md

          if [ ! -s release-notes.en.md ]; then
            echo "CHANGELOG.md does not contain a section for $VERSION." >&2
            exit 1
          fi

          if [ ! -s release-notes.ja.md ]; then
            echo "CHANGELOG.ja.md does not contain a section for $VERSION." >&2
            exit 1
          fi

          if grep -q "Unreleased\\|未リリース" release-notes.en.md release-notes.ja.md; then
            echo "Release changelog sections must use the release date, not Unreleased." >&2
            exit 1
          fi

          {
            cat release-notes.en.md
            echo
            echo "## Japanese"
            cat release-notes.ja.md
          } > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          gh release create "$TAG" \
            artifacts/packages/*.nupkg \
            artifacts/packages/*.snupkg \
            --title "$TAG" \
            --notes-file release-notes.md \
            --verify-tag
