name: Release NuGet

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag in vX.Y.Z format"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use vX.Y.Z format, for example v0.1.1." >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore and audit packages
        run: |
          dotnet restore Kawa.sln \
            -p:NuGetAudit=true \
            -p:NuGetAuditMode=all \
            -p:NuGetAuditLevel=low \
            "-warnaserror:NU1901;NU1902;NU1903;NU1904"

      - name: Pack
        env:
          PACKAGE_VERSION: ${{ steps.release.outputs.version }}
          CONFIGURATION: Release
        run: bash eng/pack.sh

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ steps.release.outputs.version }}
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error

      - name: Publish to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: bash eng/push-nuget.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          gh release create "$TAG" \
            artifacts/packages/*.nupkg \
            artifacts/packages/*.snupkg \
            --title "$TAG" \
            --notes "NuGet packages for Kawa $VERSION." \
            --verify-tag
